services:
  mysql-db:
    image: mysql:8.0
    container_name: db_redesocial
    environment:
      MYSQL_DATABASE: rede_social
      MYSQL_ROOT_PASSWORD: root
    volumes:
      # Mapeia os arquivos locais para a pasta de inicialização do MySQL
      - ./init/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./init/data.sql:/docker-entrypoint-initdb.d/2-data.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: api_redesocial
    ports:
      - "8080:8080"
    environment:
      # Sobrescreve as propriedades do arquivo se necessário
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/rede_social?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql-db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: web_redesocial
    ports:
      - "3000:80" # Mapeia a porta 3000 do seu PC para a 80 do Nginx no container
    depends_on:
      - backend
